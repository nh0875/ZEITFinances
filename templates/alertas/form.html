{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ page_title|default:"Nuevo recordatorio" }}{% endblock %}
{% block content %}
<h1>{{ page_title|default:"Nuevo recordatorio" }}</h1>
<form method="post" class="mt-3">{% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-warning" type="submit">{{ submit_label|default:"Guardar y enviar" }}</button>
    <a class="btn btn-link" href="/alertas/">Volver</a>
</form>
{% endblock %}
