{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ page_title|default:"Nuevo gasto" }}{% endblock %}
{% block content %}
<h1>{{ page_title|default:"Nuevo gasto" }}</h1>
<form method="post" class="mt-3">{% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-danger" type="submit">{{ submit_label|default:"Guardar" }}</button>
    <a class="btn btn-link" href="/gastos/">Volver</a>
</form>
{% endblock %}
